name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  check:
    name: Check, Test, Lint
    runs-on: ubuntu-latest
    steps:
      # Free ~30 GB of unused pre-installed tooling on ubuntu-latest before
      # the cargo build. With clippy --all-features + cargo test --all + a
      # release build all sharing the same target/, the default ~14 GB of
      # free space is too tight: we hit "No space left on device" on tempdir
      # creation and SIGBUS during linking under memory pressure. Removing
      # dotnet/android/ghc/codeql/docker images we don't use gives the cargo
      # steps room to breathe without touching what the build actually needs.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all

      - name: Build release
        run: cargo build --release

  postgres:
    name: Postgres backend (conformance + extras)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CTXD_PG_URL: postgres://postgres:test@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "postgres ready"
              exit 0
            fi
            sleep 2
          done
          echo "postgres did not become ready" >&2
          exit 1

      - name: Clippy (postgres crate)
        run: cargo clippy -p ctxd-store-postgres --all-targets -- -D warnings

      - name: Conformance + extras
        run: cargo test -p ctxd-store-postgres --all-targets

  python-sdk:
    name: Python SDK (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The Python integration tests spawn the workspace ``ctxd``
      # binary. Build it once per job up-front so the test suite
      # doesn't shell out to cargo on the hot path.
      - name: Build ctxd binary
        run: cargo build --bin ctxd

      - name: Install Python SDK (editable, with dev extras)
        working-directory: clients/python/ctxd-py
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: clients/python/ctxd-py
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Pytest
        working-directory: clients/python/ctxd-py
        run: pytest -xvs

  typescript-sdk:
    name: TypeScript SDK (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: clients/typescript/ctxd-client/package-lock.json

      # Integration tests spawn the workspace ``ctxd`` binary. Build
      # it once per job up-front so the test suite doesn't shell out
      # to cargo on the hot path.
      - name: Build ctxd binary
        run: cargo build --bin ctxd

      - name: Install npm dependencies
        working-directory: clients/typescript/ctxd-client
        run: npm ci

      - name: ESLint
        working-directory: clients/typescript/ctxd-client
        run: npm run lint

      - name: Typecheck
        working-directory: clients/typescript/ctxd-client
        run: npm run typecheck

      - name: Build (tsup)
        working-directory: clients/typescript/ctxd-client
        run: npm run build

      - name: Verify browser bundle has no node:net imports
        working-directory: clients/typescript/ctxd-client
        run: |
          if grep -q "node:net" dist/index.browser.js; then
            echo "::error::dist/index.browser.js contains node:net — browser stub regression"
            exit 1
          fi

      - name: Vitest
        working-directory: clients/typescript/ctxd-client
        run: npm test

      - name: npm pack dry-run
        working-directory: clients/typescript/ctxd-client
        run: npm pack --dry-run

  typescript-sdk-bun:
    name: TypeScript SDK (Bun smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: clients/typescript/ctxd-client/package-lock.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The SDK's own scripts run via npm; we use Bun for a smoke test
      # that exercises the published API surface against a real daemon.
      - name: Build ctxd binary
        run: cargo build --bin ctxd

      - name: Install npm dependencies
        working-directory: clients/typescript/ctxd-client
        run: npm ci

      - name: Build (tsup)
        working-directory: clients/typescript/ctxd-client
        run: npm run build

      - name: Bun import smoke test
        working-directory: clients/typescript/ctxd-client
        run: |
          bun -e 'import("./dist/index.js").then(m => {
            const required = ["CtxdClient", "Operation", "verifySignature", "WireClient", "CtxdError"];
            for (const k of required) {
              if (!(k in m)) { console.error("missing:", k); process.exit(1); }
            }
            console.log("Bun import smoke OK:", Object.keys(m).length, "exports");
          })'
