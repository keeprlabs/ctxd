name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  check:
    name: Check, Test, Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all

      - name: Build release
        run: cargo build --release

  postgres:
    name: Postgres backend (conformance + extras)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CTXD_PG_URL: postgres://postgres:test@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "postgres ready"
              exit 0
            fi
            sleep 2
          done
          echo "postgres did not become ready" >&2
          exit 1

      - name: Clippy (postgres crate)
        run: cargo clippy -p ctxd-store-postgres --all-targets -- -D warnings

      - name: Conformance + extras
        run: cargo test -p ctxd-store-postgres --all-targets

  python-sdk:
    name: Python SDK (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The Python integration tests spawn the workspace ``ctxd``
      # binary. Build it once per job up-front so the test suite
      # doesn't shell out to cargo on the hot path.
      - name: Build ctxd binary
        run: cargo build --bin ctxd

      - name: Install Python SDK (editable, with dev extras)
        working-directory: clients/python/ctxd-py
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: clients/python/ctxd-py
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Pytest
        working-directory: clients/python/ctxd-py
        run: pytest -xvs
